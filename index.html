<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Báo Cáo Nội Bộ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS bổ sung để tối ưu giao diện ẩn/hiện */
        .hidden-report { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="login-container" class="flex min-h-screen items-center justify-center px-4">
        <div class="w-full max-w-md space-y-8 rounded-lg bg-white p-8 shadow-md">
            <div class="text-center">
                <h2 class="text-3xl font-bold tracking-tight text-gray-900">Đăng nhập hệ thống</h2>
                <p class="mt-2 text-sm text-gray-600">Vui lòng dùng tài khoản được cấp để xem báo cáo</p>
            </div>
            <form id="login-form" class="mt-8 space-y-6">
                <div class="space-y-4 rounded-md shadow-sm">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                        <input id="email" type="email" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700">Mật khẩu</label>
                        <input id="password" type="password" required class="mt-1 block w-full rounded-md border border-gray-300 px-3 py-2 shadow-sm focus:border-indigo-500 focus:outline-none focus:ring-indigo-500 sm:text-sm">
                    </div>
                </div>
                <div>
                    <button type="submit" class="group relative flex w-full justify-center rounded-md bg-indigo-600 px-4 py-2 text-sm font-medium text-white hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2">
                        Đăng nhập
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div id="dashboard-container" class="hidden flex h-screen bg-gray-200">
        
        <div class="flex w-64 flex-col bg-gray-800 text-white">
            <div class="flex h-16 items-center justify-center bg-gray-900 font-bold text-xl px-4">
                <span id="user-display" class="text-sm truncate">Đang tải...</span>
            </div>
            
            <nav class="flex-1 space-y-1 px-2 py-4">
                <button id="menu-report-1" onclick="switchReport(1)" class="w-full text-left flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-gray-700">
                    📊 Báo cáo số 1
                </button>
                <button id="menu-report-2" onclick="switchReport(2)" class="w-full text-left flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-gray-700">
                    📊 Báo cáo số 2
                </button>
                <button id="menu-report-3" onclick="switchReport(3)" class="w-full text-left flex items-center px-4 py-2 text-sm font-medium rounded-md hover:bg-gray-700">
                    📊 Báo cáo số 3
                </button>
                <button id="menu-report-4" onclick="switchReport(4)" class="w-full text-left flex items-center px-4 py-2 text-sm font-medium rounded-md bg-indigo-600 hover:bg-indigo-700">
                    📈 Báo cáo số 4 (Đối tác)
                </button>
            </nav>

            <div class="p-4 border-t border-gray-700">
                <button id="logout-btn" class="w-full bg-red-600 hover:bg-red-700 text-white text-sm py-2 px-4 rounded-md font-medium transition">
                    Đăng xuất
                </button>
            </div>
        </div>

        <div class="flex flex-1 flex-col overflow-hidden">
            <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100 p-6">
                <div class="h-full rounded-lg border-4 border-dashed border-gray-200 bg-white p-4">
                    <h1 id="report-title" class="text-2xl font-bold mb-4 text-gray-800">Đang tải báo cáo...</h1>
                    
                    <div class="w-full h-[calc(100%-3rem)] bg-gray-50 flex items-center justify-center rounded border">
                        <div id="report-viewer" class="w-full h-full p-4 overflow-auto text-gray-600">
                            Chọn một báo cáo từ menu bên trái để xem dữ liệu.
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // CẤU HÌNH SUPABASE ĐÃ ĐƯỢC CẬP NHẬT TỰ ĐỘNG
        const SUPABASE_URL = "https://mrqldgycwovpbmzdeuyz.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_itZfZBVw7bxE184tGh7x8A_0_r-QB5p";

        // Khởi tạo Supabase Client
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM Elements
        const loginContainer = document.getElementById('login-container');
        const dashboardContainer = document.getElementById('dashboard-container');
        const loginForm = document.getElementById('login-form');
        const userDisplay = document.getElementById('user-display');
        const logoutBtn = document.getElementById('logout-btn');

        // --- LỚP BẢO MẬT & PHÂN QUYỀN TRÊN FRONTEND ---
        function applyPermissions(email) {
            userDisplay.textContent = email;

            if (email === 'guest@tcivn.com') {
                // 1. Ẩn toàn bộ menu báo cáo 1, 2, 3 đối với tài khoản Guest
                document.getElementById('menu-report-1').classList.add('hidden-report');
                document.getElementById('menu-report-2').classList.add('hidden-report');
                document.getElementById('menu-report-3').classList.add('hidden-report');

                // 2. Ép tài khoản Guest vào thẳng Báo cáo số 4
                switchReport(4);
            } else {
                // Tài khoản nội bộ công ty: Hiển thị đầy đủ menu
                document.getElementById('menu-report-1').classList.remove('hidden-report');
                document.getElementById('menu-report-2').classList.remove('hidden-report');
                document.getElementById('menu-report-3').classList.remove('hidden-report');
                
                // Mặc định mở Báo cáo 1 cho Admin/Internal
                switchReport(1);
            }
        }

        // --- HÀM TẢI VÀ CHUYỂN ĐỔI BÁO CÁO ---
        async function switchReport(reportNumber) {
            const reportTitle = document.getElementById('report-title');
            const reportViewer = document.getElementById('report-viewer');
            
            reportTitle.textContent = `Báo cáo số ${reportNumber}`;
            reportViewer.innerHTML = `<p class="text-blue-500 animate-pulse">Chờ một chút, đang lấy dữ liệu an toàn từ Supabase...</p>`;

            // Xóa trạng thái Active của các nút cũ, chuyển sang nút hiện tại
            for(let i=1; i<=4; i++) {
                document.getElementById(`menu-report-${i}`).classList.remove('bg-indigo-600');
            }
            document.getElementById(`menu-report-${reportNumber}`).classList.add('bg-indigo-600');

            try {
                // Tải dữ liệu file tương ứng từ bucket 'chotruyenthong'
                // Ví dụ cấu trúc: bao-cao-1/data.html hoặc bao-cao-4/data.html
                const fileName = `bao-cao-${reportNumber}/data.html`; 
                
                const { data, error } = await supabase.storage
                    .from('chotruyenthong')
                    .download(fileName);

                if (error) throw error;

                // Đọc file blob nhận được và hiển thị lên màn hình
                const text = await data.text();
                reportViewer.innerHTML = text;

            } catch (err) {
                console.error(err);
                reportViewer.innerHTML = `
                    <div class="text-red-500 font-semibold p-4 bg-red-50 rounded border border-red-200">
                        ❌ Lỗi: Bạn không có quyền xem báo cáo này hoặc dữ liệu chưa được tải lên hệ thống.
                    </div>`;
            }
        }

        // --- XỬ LÝ SỰ KIỆN AUTH (ĐĂNG NHẬP / ĐĂNG XUẤT) ---
        
        // Theo dõi trạng thái đăng nhập
        supabase.auth.onAuthStateChange((event, session) => {
            if (session && session.user) {
                // Đã đăng nhập thành công
                loginContainer.classList.add('hidden');
                dashboardContainer.classList.remove('hidden');
                applyPermissions(session.user.email);
            } else {
                // Chưa đăng nhập hoặc đã Đăng xuất
                loginContainer.classList.remove('hidden');
                dashboardContainer.classList.add('hidden');
            }
        });

        // Submit form Đăng nhập
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const { error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) {
                alert(`Đăng nhập thất bại: ${error.message}`);
            }
        });

        // Bấm nút Đăng xuất
        logoutBtn.addEventListener('click', async () => {
            await supabase.auth.signOut();
        });
    </script>
</body>
</html>
